name: simple_monopoly
description: A Simple Monopoly clone for local multiplayer.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1   # StateNotifier + Provider wiring
  flame: ^1.18.0              # Game loop, components, effects

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
